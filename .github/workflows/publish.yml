name: Publish to PyPI

# Publishes when you publish a GitHub Release, and can be run by hand from the
# Actions tab (workflow_dispatch) — the latter is how the first release, whose
# "published" event predates this workflow, gets onto PyPI.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The web frontend is a build artifact, not committed, so it must be
      # built and placed in backend/h5grid/static/ BEFORE the Python package is
      # built — otherwise the wheel ships an empty static dir and the installed
      # app serves nothing.
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      # Guard: refuse to publish a wheel that does not actually contain the
      # built frontend. This is the one way this pipeline could silently ship a
      # broken package, so it is checked explicitly.
      - name: Verify the wheel bundles the frontend
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          static = [n for n in names if "/static/" in n and n.endswith((".html", ".js", ".css"))]
          if not any(n.endswith("index.html") for n in static):
              sys.exit(f"FAIL: {wheel} has no bundled frontend (static/index.html missing)")
          print(f"OK: {wheel} bundles {len(static)} frontend files")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A named environment lets you require a manual approval before publish in
    # the repo's Settings → Environments, and is where the PyPI trusted
    # publisher is scoped.
    environment:
      name: pypi
      url: https://pypi.org/project/h5grid/
    # OIDC token for PyPI Trusted Publishing — no stored API token/secret.
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
