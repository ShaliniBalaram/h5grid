name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The versions we test and support. The dependency stack
        # (h5py + hdf5plugin + PyTables) ships wheels for all three, so no
        # system HDF5 libraries are needed — a plain pip install suffices.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The fixtures generate themselves on first run (see conftest.py), so no
      # data files are committed. This proves that path works from clean.
      - name: Run tests
        run: pytest -q

  frontend:
    name: frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # tsc -b type-checks; vite build proves the bundle compiles. The Python
      # suite never touches the frontend, so this is the only gate on it.
      - name: Type-check and build
        run: |
          npx tsc -b
          npm run build
